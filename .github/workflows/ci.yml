name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Test y cobertura
        run: mvn -B verify
        working-directory: backend

      - name: Subir reporte JaCoCo
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/jacoco.xml

  frontend:
    name: Frontend — Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Tests con cobertura
        run: npm run test:coverage
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev
        working-directory: frontend
        continue-on-error: true

  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias frontend
        run: npm ci
        working-directory: frontend

      - name: Generar cobertura frontend
        run: npm run test:coverage
        working-directory: frontend

      - name: Ajustar rutas lcov para SonarCloud
        run: sed -i 's|^SF:src/|SF:frontend/src/|g' frontend/coverage/lcov.info

      - name: Compilar backend (con JaCoCo)
        run: mvn -B verify
        working-directory: backend

      - name: Análisis SonarCloud
        run: npx --yes sonar-scanner -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
