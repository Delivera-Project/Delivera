name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Test y cobertura
        run: mvn -B verify
        working-directory: backend

      - name: Subir reporte JaCoCo
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/jacoco.xml

  frontend:
    name: Frontend — Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Tests con cobertura
        run: npm run test:coverage
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev
        working-directory: frontend

      - name: Subir reporte lcov
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lcov-report
          path: frontend/coverage/lcov.info

  security:
    name: Security — IaC Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: table

  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Descargar reporte JaCoCo
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco

      - name: Descargar reporte lcov
        uses: actions/download-artifact@v4
        with:
          name: lcov-report
          path: frontend/coverage

      - name: Ajustar rutas lcov para SonarCloud
        run: sed -i 's|^SF:src/|SF:frontend/src/|g' frontend/coverage/lcov.info

      - name: Compilar backend y resolver dependencias (para Sonar)
        run: mvn -B compile dependency:copy-dependencies -DincludeScope=compile -DoutputDirectory=target/dependency -DskipTests
        working-directory: backend

      - name: Análisis SonarCloud
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt
