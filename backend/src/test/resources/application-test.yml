server:
  port: 8081

logging:
  level:
    com.delivera: DEBUG

spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  flyway:
    enabled: false

app:
  jwt:
    secret: delivera-jwt-secret-key-para-tests # TODO: Esto se puede mejorar
    expiration: 3600
