logging:
  level:
    com.delivera: INFO
    org.springframework.web: WARN

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

management:
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@delivera.app}
  tracking-url-base: ${TRACKING_URL_BASE:https://delivera.app/track/}
  contact-email: ${CONTACT_EMAIL:contact@delivera.com}
  file:
    max-upload-bytes: ${FILE_MAX_UPLOAD_BYTES:2097152}
  auth:
    rate-limit:
      max-attempts: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:5}
      window-ms: ${AUTH_RATE_LIMIT_WINDOW_MS:60000}
