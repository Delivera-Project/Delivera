logging:
  level:
    com.delivera: INFO
    org.springframework.web: WARN

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

management:
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
