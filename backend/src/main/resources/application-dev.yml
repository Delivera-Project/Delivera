spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5433/delivera_dev
    username: delivera_user
    password: delivera_pass

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

management:
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: ${JWT_SECRET:delivera-jwt-secret-key-para-desarrollo}
    expiration: 86400
  cors:
    allowed-origins: http://localhost:3000
  mail:
    enabled: false
    from: noreply@delivera.app
  frontend-url: http://localhost:3000
  tracking-url-base: http://localhost:3000/track/
  contact-email: contact@delivera.com
  file:
    max-upload-bytes: 2097152
  auth:
    rate-limit:
      max-attempts: 5
      window-ms: 60000
